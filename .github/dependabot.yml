version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      electron:
        patterns:
          - "electron"
          - "electron-builder"
          - "electron-updater"
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "electron"
          - "electron-builder"
          - "electron-updater"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Madrid"
    labels:
      - dependencies
      - github-actions
