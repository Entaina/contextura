name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunes 03:00 UTC — detecta CVEs nuevas aunque no haya cambios.
    - cron: '0 3 * * 1'
  workflow_dispatch:

# Cancelar ejecuciones obsoletas sobre la misma rama.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (neostandard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-backend:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ is required: `node --test` only honors glob patterns
          # since Node 21, and the test scripts use them to pick .test.mjs
          # and .test.cjs files under test/{unit,integration}/**.
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run test:ci

  test-e2e:
    name: Tests (e2e Electron)
    runs-on: macos-latest
    # Advisory during initial stabilization: allow the pipeline to go green
    # even if the Electron e2e flakes. Promote to bloqueante once the suite
    # has been observed stable across enough real runs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
        env:
          ELECTRON_RUN_AS_NODE: ''

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Falla en severidad 'high' o superior. Subir a 'moderate' cuando el
      # ruido transitivo se estabilice.
      - run: npm audit --audit-level=high

  electronegativity:
    name: Electronegativity (SAST Electron)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run electronegativity
        # El formato se infiere de la extensión del fichero de salida
        # (`.sarif` o `.csv`); electronegativity no tiene flag `-f`.
        run: npx --yes @doyensec/electronegativity -i . -o electronegativity.sarif
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: electronegativity.sarif
          category: electronegativity

  secret-scanning:
    name: TruffleHog (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action@v2 exige licencia de pago para cuentas de
      # organización (Entaina), así que usamos TruffleHog, que es gratis y
      # cubre un catálogo de detectores equivalente. `--only-verified` filtra
      # a secretos que TruffleHog ha podido comprobar activamente contra su
      # servicio de origen (reduce casi todo el ruido de falsos positivos).
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
