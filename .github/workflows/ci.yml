name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunes 03:00 UTC — detecta CVEs nuevas aunque no haya cambios.
    - cron: '0 3 * * 1'

# Cancelar ejecuciones obsoletas sobre la misma rama.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (neostandard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Falla en severidad 'high' o superior. Subir a 'moderate' cuando el ruido
      # de dependencias transitivas de electron-builder sea manejable.
      - run: npm audit --audit-level=high

  electronegativity:
    name: Electronegativity (SAST Electron)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Run electronegativity
        run: npx --yes @doyensec/electronegativity -i . -o electronegativity.sarif -f sarif
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: electronegativity.sarif
          category: electronegativity

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # gitleaks-action es gratuita para repos públicos y organizaciones con
      # menos de N usuarios. Si el repo pasa a privado y la acción exige
      # licencia, alternativas gratis:
      #   - Instalar el binario gitleaks vía curl y correrlo a mano.
      #   - Reemplazar por trufflesecurity/trufflehog@main.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
