name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never cancel a partially-uploaded release — we'd leave a draft with missing
# assets that the client auto-updater would later pick up as broken.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please (PR + draft release)
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          # PAT instead of GITHUB_TOKEN because the Entaina org policy
          # forbids workflows from opening pull requests. The PAT is
          # stored as a repo secret; see docs/release.md for setup.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-mac:
    name: Build and publish DMG (macOS)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # Match test-e2e in ci.yml; Node 22+ is required for the test suite
          # and harmless for electron-builder.
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Generate app icon (idempotent)
        run: ./scripts/build-icon.sh
      - name: Build universal DMG and upload assets to draft release
        run: npx electron-builder --mac --publish always
        env:
          # electron-builder looks for GH_TOKEN first. The built-in
          # GITHUB_TOKEN of the workflow has write access to contents
          # of the same repo, which is all we need to upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify assets uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)
          printf 'Uploaded assets:\n%s\n' "$ASSETS"
          echo "$ASSETS" | grep -q '^latest-mac.yml$'            || { echo "::error::latest-mac.yml missing"; exit 1; }
          echo "$ASSETS" | grep -Eq '^Contextura-.*\.dmg$'        || { echo "::error::DMG missing"; exit 1; }
          echo "$ASSETS" | grep -Eq '^Contextura-.*\.dmg\.blockmap$' || { echo "::error::DMG blockmap missing"; exit 1; }
      - name: Publish release (flip draft → published)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.release-please.outputs.tag_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
